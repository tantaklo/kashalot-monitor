name: Daily Fleet Scan

on:
  schedule:
    - cron: '0 6 * * *'    # 09:00 Москва — утреннее сканирование
    - cron: '0 11 * * *'   # 14:00 Москва — дневное сканирование
    - cron: '0 16 * * *'   # 19:00 Москва — вечернее сканирование
    - cron: '55 20 * * *'  # 23:55 Москва — выручка из админки
  workflow_dispatch:         # ручной запуск из GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run fleet scan (09:00 / 14:00 / 19:00)
        if: >
          github.event.schedule == '0 6 * * *' ||
          github.event.schedule == '0 11 * * *' ||
          github.event.schedule == '0 16 * * *' ||
          github.event_name == 'workflow_dispatch'
        run: node scan.js

      - name: Run revenue scrape (23:55)
        if: github.event.schedule == '55 20 * * *' || github.event_name == 'workflow_dispatch'
        env:
          GRAFANA_USER: ${{ secrets.GRAFANA_USER }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
        run: node scrape-grafana.js

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json data/revenue-daily.json data/tariff-history.json data/orders-daily.json data/top-cars-daily.json data/firmware-history.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
