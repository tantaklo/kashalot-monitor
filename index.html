<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мониторинг Кашалот</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f13;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px 64px;
    }

    .site-nav { position: sticky; top: 0; z-index: 100; width: 100%; background: #0a0a10; border-bottom: 1px solid #1e1e2a; padding: 0 24px; margin-bottom: 0; align-self: stretch; }
    .nav-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 50px; }
    .nav-brand { font-size: 15px; font-weight: 700; color: #e2e8f0; text-decoration: none; }
    .nav-brand em { color: #3b82f6; font-style: normal; }
    .nav-links { display: flex; gap: 2px; }
    .nav-link { font-size: 13px; color: #4b5563; text-decoration: none; padding: 6px 14px; border-radius: 8px; transition: color 0.15s, background 0.15s; }
    .nav-link:hover { color: #94a3b8; background: #1a1a24; }
    .nav-link.active { color: #e2e8f0; }

    .card {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 16px;
      padding: 40px 48px;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .label {
      font-size: 13px;
      color: #6b7280;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .url {
      font-size: 15px;
      color: #94a3b8;
      margin-bottom: 20px;
      word-break: break-all;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      align-items: center;
    }

    .input-prefix {
      font-size: 13px;
      color: #4b5563;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .input-num {
      flex: 1;
      background: #12121a;
      border: 1px solid #2d2d3d;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 16px;
      font-family: inherit;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }

    .input-num:focus { border-color: #3b82f6; }

    .btn-check {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .btn-check:hover { background: #2563eb; }

    .status-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      transition: background 0.4s, box-shadow 0.4s;
    }

    .status-ring.checking {
      background: #1e2a3a;
      animation: pulse-blue 1.2s infinite;
    }

    .status-ring.up       { background: #052e16; box-shadow: 0 0 32px #16a34a55; }
    .status-ring.notfound { background: #1a1400; box-shadow: 0 0 32px #ca8a0455; }
    .status-ring.down     { background: #2d0707; box-shadow: 0 0 32px #dc262655; }

    @keyframes pulse-blue {
      0%, 100% { box-shadow: 0 0 0 0 #3b82f620; }
      50%       { box-shadow: 0 0 24px 8px #3b82f630; }
    }

    .status-text {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      transition: color 0.4s;
    }

    .status-text.up       { color: #4ade80; }
    .status-text.notfound { color: #fbbf24; }
    .status-text.down     { color: #f87171; }
    .status-text.checking { color: #60a5fa; }

    .status-sub {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
      min-height: 20px;
    }

    /* Тарифы */
    .tariffs-wrap { margin-bottom: 32px; text-align: left; }

    .tariffs-title {
      font-size: 12px;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .tariffs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tariff-card {
      background: #12121a;
      border: 1px solid #2d2d3d;
      border-radius: 10px;
      padding: 14px 12px;
    }

    .tariff-type { font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 2px; }
    .tariff-meta { font-size: 11px; color: #4b5563; margin-bottom: 8px; }

    .tariff-prices { display: flex; align-items: baseline; gap: 8px; }
    .tariff-price-now { font-size: 20px; font-weight: 700; color: #4ade80; }
    .tariff-price-old { font-size: 13px; color: #4b5563; text-decoration: line-through; }

    .tariffs-empty {
      background: #12121a;
      border: 1px dashed #3d3d50;
      border-radius: 10px;
      padding: 20px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }

    .divider { height: 1px; background: #2d2d3d; margin-bottom: 32px; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-box {
      background: #12121a;
      border: 1px solid #2d2d3d;
      border-radius: 10px;
      padding: 16px 8px;
    }

    .stat-val { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .stat-val.green { color: #4ade80; }
    .stat-val.red   { color: #f87171; }
    .stat-val.blue  { color: #60a5fa; }

    .stat-label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .timer-bar-wrap {
      height: 4px;
      background: #2d2d3d;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .timer-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 4px;
      width: 100%;
    }

    .timer-label { font-size: 12px; color: #4b5563; }

    .revenue-link {
      display: block;
      margin-top: 20px;
      padding: 10px 16px;
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 10px;
      color: #60a5fa;
      text-decoration: none;
      font-size: 13px;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .revenue-link:hover { border-color: #3b82f6; background: #1e1e2e; }


    .log { margin-top: 24px; text-align: left; }

    .log-title {
      font-size: 12px;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .log-list { list-style: none; max-height: 150px; overflow-y: auto; }
    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: #2d2d3d; border-radius: 4px; }

    .log-item {
      font-size: 12px;
      padding: 5px 0;
      border-bottom: 1px solid #1e1e2a;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .log-item .time { color: #4b5563; flex-shrink: 0; }
    .log-item .dot  { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .log-item .dot.up       { background: #4ade80; }
    .log-item .dot.notfound { background: #fbbf24; }
    .log-item .dot.down     { background: #f87171; }
    .log-item .msg { color: #94a3b8; }
  </style>
</head>
<body>
  <nav class="site-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">Кашалот <em>Шеринг</em></a>
      <div class="nav-links">
        <a class="nav-link active" href="index.html">Мониторинг</a>
        <a class="nav-link" href="dashboard.html">Аналитика</a>
        <a class="nav-link" href="notifications.html">Уведомления</a>
      </div>
    </div>
  </nav>
  <div class="card" style="margin-top: 40px">
    <div class="label">Мониторинг доступности</div>
    <div class="url" id="urlDisplay">https://k-s.app/qr/1057</div>

    <div class="input-row">
      <span class="input-prefix">k-s.app/qr/</span>
      <input class="input-num" type="number" id="qrInput" value="1057" min="1" />
      <button class="btn-check" id="btnApply">Проверить</button>
    </div>

    <div class="status-ring checking" id="ring">🔄</div>
    <div class="status-text checking" id="statusText">Проверка...</div>
    <div class="status-sub" id="statusSub">Ожидание первого ответа</div>

    <div class="tariffs-wrap" id="tariffsWrap">
      <div class="tariffs-title">Тарифы на аренду</div>
      <div class="tariffs" id="tariffsGrid" style="display:none"></div>
      <div class="tariffs-empty" id="tariffsEmpty">Загружаем данные...</div>
    </div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-val green" id="countUp">0</div>
        <div class="stat-label">Доступен</div>
      </div>
      <div class="stat-box">
        <div class="stat-val red" id="countDown">0</div>
        <div class="stat-label">Недоступен</div>
      </div>
      <div class="stat-box">
        <div class="stat-val blue" id="countTotal">0</div>
        <div class="stat-label">Всего</div>
      </div>
    </div>

    <div class="timer-bar-wrap">
      <div class="timer-bar" id="timerBar"></div>
    </div>
    <div class="timer-label" id="timerLabel">Следующая проверка через 10 сек</div>

    <div class="log">
      <div class="log-title">Последние события</div>
      <ul class="log-list" id="logList"></ul>
    </div>

  </div>

  <script>
    const INTERVAL = 10000;
    const PROXY = 'https://kashalot-proxy.vegano-argentino-ru.workers.dev/?url=';

    let qrNum = '1057';
    let countUp = 0, countDown = 0, countTotal = 0;
    let nextCheck = Date.now() + INTERVAL;
    let timerRAF, checkInterval;

    const ring        = document.getElementById('ring');
    const statusText  = document.getElementById('statusText');
    const statusSub   = document.getElementById('statusSub');
    const elUp        = document.getElementById('countUp');
    const elDown      = document.getElementById('countDown');
    const elTotal     = document.getElementById('countTotal');
    const timerBar    = document.getElementById('timerBar');
    const timerLabel  = document.getElementById('timerLabel');
    const logList     = document.getElementById('logList');
    const qrInput     = document.getElementById('qrInput');
    const btnApply    = document.getElementById('btnApply');
    const urlDisplay  = document.getElementById('urlDisplay');
    const tariffsWrap = document.getElementById('tariffsWrap');
    const tariffsGrid = document.getElementById('tariffsGrid');

    function applyNewTarget() {
      const num = qrInput.value.trim();
      if (!num) return;
      qrNum = num;
      urlDisplay.textContent = 'https://k-s.app/qr/' + qrNum;
      countUp = 0; countDown = 0; countTotal = 0;
      elUp.textContent = 0; elDown.textContent = 0; elTotal.textContent = 0;
      logList.innerHTML = '';
      tariffsGrid.style.display = 'none';
      tariffsEmpty.style.display = 'block';
      tariffsEmpty.textContent = 'Загружаем данные...';
      clearInterval(checkInterval);
      check();
      checkInterval = setInterval(check, INTERVAL);
    }

    btnApply.addEventListener('click', applyNewTarget);
    qrInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyNewTarget(); });

    function setStatus(state, label) {
      ring.className = 'status-ring ' + state;
      statusText.className = 'status-text ' + state;
      ring.textContent = { up: '✅', notfound: '⚠️', down: '❌', checking: '🔄' }[state] || '🔄';
      statusText.textContent = label;
    }

    function addLog(state, msg) {
      const time = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const li = document.createElement('li');
      li.className = 'log-item';
      li.innerHTML = `<span class="time">${time}</span><span class="dot ${state}"></span><span class="msg">${msg}</span>`;
      logList.prepend(li);
      if (logList.children.length > 50) logList.removeChild(logList.lastChild);
    }

    const tariffsEmpty = document.getElementById('tariffsEmpty');

    function showTariffsPlaceholder(msg) {
      tariffsGrid.innerHTML = '';
      tariffsGrid.style.display = 'none';
      tariffsEmpty.textContent = msg;
      tariffsEmpty.style.display = 'block';
      tariffsWrap.style.display = 'block';
    }

    function renderTariffs(tariffs) {
      tariffsEmpty.style.display = 'none';
      tariffsGrid.style.display = 'grid';
      tariffsGrid.innerHTML = '';
      tariffs.forEach(t => {
        const card = document.createElement('div');
        card.className = 'tariff-card';
        card.innerHTML = `
          <div class="tariff-type">${t.type}</div>
          <div class="tariff-meta">${t.duration}${t.speed ? ' · ' + t.speed : ''}</div>
          <div class="tariff-prices">
            <span class="tariff-price-now">${t.price}</span>
            ${t.oldPrice ? `<span class="tariff-price-old">${t.oldPrice}</span>` : ''}
          </div>`;
        tariffsGrid.appendChild(card);
      });
      tariffsWrap.style.display = 'block';
    }

    function parseTariffs(html) {
      if (html.includes('Нет Кашалота')) return { state: 'notfound', tariffs: [] };
      if (html.includes('устал') || html.includes('вернется') || html.includes('погода'))
        return { state: 'offline', tariffs: [] };

      const types     = [...html.matchAll(/class="box"><h3 class="white">([\s\S]*?)<\/h3>/g)].map(m => m[1].trim());
      const durations = [...html.matchAll(/class="time"><h3 class="white">[\s\S]*?(\d+\s*мин)/g)].map(m => m[1].trim());
      const speeds    = [...html.matchAll(/alt="(До \d+ км\/ч)"/g)].map(m => m[1]);
      const prices    = [...html.matchAll(/<h1 class="white shadow-text[\s\S]*?">[\s\S]*?(\d+)\s*₽<\/h1>/g)].map(m => m[1] + ' ₽');
      const oldPrices = [...html.matchAll(/class="anchor-price">\s*(\d+)\s*₽/g)].map(m => m[1] + ' ₽');

      const count = Math.min(types.length, prices.length);
      if (count === 0) return { state: 'offline', tariffs: [] };

      const tariffs = [];
      for (let i = 0; i < count; i++) {
        tariffs.push({
          type:     types[i]     || '',
          duration: durations[i] || '',
          speed:    speeds[i]    || '',
          price:    prices[i]    || '',
          oldPrice: oldPrices[i] || '',
        });
      }
      return { state: 'up', tariffs };
    }

    async function check() {
      setStatus('checking', 'Проверка...');
      statusSub.textContent = 'Загружаем страницу...';
      timerBar.style.transition = 'none';
      timerBar.style.width = '100%';

      const t0 = Date.now();
      const pageUrl = 'https://k-s.app/qr/' + qrNum;

      try {
        const res = await fetch(PROXY + encodeURIComponent(pageUrl), { cache: 'no-store' });
        if (!res.ok) throw new Error('ошибка прокси: ' + res.status);
        const html = await res.text();
        const ms = Date.now() - t0;
        const { state, tariffs } = parseTariffs(html);
        const timeStr = new Date().toLocaleTimeString('ru-RU');

        if (state === 'up') {
          countUp++;
          setStatus('up', 'Доступен');
          statusSub.textContent = `Ответ за ${ms} мс · ${timeStr}`;
          addLog('up', `Доступен, ${tariffs.length} тарифов (${ms} мс)`);
          renderTariffs(tariffs);
        } else if (state === 'offline') {
          countDown++;
          setStatus('notfound', 'Не в сезоне');
          statusSub.textContent = `Кашалот №${qrNum} сейчас не работает · ${timeStr}`;
          addLog('notfound', `Кашалот №${qrNum} не в сезоне`);
          showTariffsPlaceholder('Кашалот сейчас не работает — тарифы временно недоступны');
        } else {
          countDown++;
          setStatus('notfound', 'Не найден');
          statusSub.textContent = `Кашалот №${qrNum} не существует · ${timeStr}`;
          addLog('notfound', `Кашалот №${qrNum} не найден`);
          showTariffsPlaceholder('Кашалот с таким номером не существует');
        }
      } catch (e) {
        countDown++;
        setStatus('down', 'Сервер недоступен');
        statusSub.textContent = `Нет ответа · ${new Date().toLocaleTimeString('ru-RU')}`;
        addLog('down', 'Нет ответа: ' + (e.message || 'network error'));
        showTariffsPlaceholder('Сервер не отвечает — тарифы недоступны');
      }

      countTotal++;
      elUp.textContent = countUp;
      elDown.textContent = countDown;
      elTotal.textContent = countTotal;

      nextCheck = Date.now() + INTERVAL;
      animateTimer();
    }

    function animateTimer() {
      cancelAnimationFrame(timerRAF);
      function frame() {
        const remaining = Math.max(0, nextCheck - Date.now());
        const pct = (remaining / INTERVAL) * 100;
        timerBar.style.transition = 'width 0.1s linear';
        timerBar.style.width = pct + '%';
        const sec = Math.ceil(remaining / 1000);
        timerLabel.textContent = sec > 0 ? `Следующая проверка через ${sec} сек` : 'Проверяем...';
        if (remaining > 0) timerRAF = requestAnimationFrame(frame);
      }
      timerRAF = requestAnimationFrame(frame);
    }

    check();
    checkInterval = setInterval(check, INTERVAL);
  </script>
</body>
</html>
